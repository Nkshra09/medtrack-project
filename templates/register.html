{% extends "base.html" %}
{% block content %}

<div class="auth-bg" style="background:linear-gradient(135deg,#f093fb 0%,#f5576c 50%,#fda085 100%);">
    <div style="background:white;border-radius:24px;padding:2.5rem;width:100%;max-width:500px;box-shadow:0 30px 80px rgba(0,0,0,0.25);">

        <!-- Header -->
        <div style="text-align:center;margin-bottom:2rem;">
            <div style="font-size:3rem;margin-bottom:0.5rem;">👤</div>
            <h2 style="font-size:1.8rem;font-weight:900;color:var(--dark);">Create Account</h2>
            <p style="color:var(--gray);font-size:0.9rem;">Join MedTrack — free for patients & doctors</p>
        </div>

        {% if error %}
        <div class="alert alert-error">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/register">

            <!-- Name + Age -->
            <div class="two-col">
                <div class="form-group">
                    <label>👤 Full Name</label>
                    <input type="text" name="name" placeholder="John Smith" required>
                </div>
                <div class="form-group">
                    <label>🎂 Age</label>
                    <input type="number" name="age" placeholder="25" min="1" max="120" required>
                </div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>📧 Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" name="password" placeholder="Create a strong password" required>
            </div>

            <!-- Blood Type + Phone -->
            <div class="two-col">
                <div class="form-group">
                    <label>🩸 Blood Type</label>
                    <select name="blood_type" required>
                        <option value="">Select...</option>
                        <option>A+</option><option>A-</option>
                        <option>B+</option><option>B-</option>
                        <option>AB+</option><option>AB-</option>
                        <option>O+</option><option>O-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📱 Phone Number</label>
                    <input type="tel" name="phone" placeholder="9876543210" required>
                </div>
            </div>

            <!-- Role -->
            <div class="form-group">
                <label>🏥 Register As</label>
                <select name="role" required>
                    <option value="">Select your role...</option>
                    <option value="patient">👤 Patient</option>
                    <option value="doctor">👨‍⚕️ Doctor</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary" style="font-size:1rem;padding:0.9rem;border-radius:50px;margin-top:0.5rem;">
                🚀 Create My Account
            </button>
        </form>

        <div class="form-link" style="margin-top:1.5rem;">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</div>

{% endblock %}
