{% extends "base.html" %}
{% block content %}

<div class="dashboard-page">
    <div style="max-width:520px;margin:0 auto;">
        <div style="font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;margin-bottom:0.4rem;">🔬 Submit Diagnosis</div>
        <div style="color:var(--gray);font-size:0.9rem;margin-bottom:2rem;">Add diagnosis for this appointment</div>
        <div class="section-card">
            <form method="POST" action="/submit_diagnosis">
                <input type="hidden" name="appointment_id" value="{{ appointment_id }}">
                <div class="form-group">
                    <label>Diagnosis / Condition</label>
                    <input type="text" name="diagnosis" placeholder="e.g. Hypertension, Migraine..." required>
                </div>
                <div style="display:flex;gap:1rem;margin-top:0.5rem;">
                    <a href="/view_appointment_doctor" class="btn btn-outline" style="flex:1;text-align:center;padding:0.8rem;">← Back</a>
                    <button type="submit" class="btn btn-teal" style="flex:2;border-radius:50px;">✅ Submit Diagnosis</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
